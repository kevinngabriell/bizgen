name: Deploy Bizgen

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      APP_DIR: /home/ubuntu/apps/bizgen
      NEXT_PUBLIC_API_URL: "https://getmovira.com/bizgen-api/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Sync files to app directory
        run: |
          mkdir -p "$APP_DIR"
          rsync -a --delete \
            --exclude=".git" \
            --exclude=".github" \
            ./ "$APP_DIR"/

      - name: Start / Restart app with PM2
        run: |
          cd "$APP_DIR"
          export NODE_ENV=production
          
          # Start kalau belum pernah jalan, kalau sudah → restart
          pm2 start ecosystem.config.cjs --only bizgen || pm2 restart bizgen
          pm2 save